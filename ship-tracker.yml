name: Ship Tracker

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  track-ship:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run ship tracker
      run: python ship_tracker_github.py

    - name: Commit state changes
      run: |
        git config --local user.email "github-actions@github.com"
        git config --local user.name "GitHub Actions"
        git add ship_state.json || true
        git commit -m "Update ship state [skip ci]" || true
        git push || true
